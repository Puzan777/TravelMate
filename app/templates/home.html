<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strange Land Tours & Travels</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: #0b3d2e;
        }

        .navbar .logo {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .navbar ul li {
            margin-left: 25px;
        }

        .navbar ul li a {
            text-decoration: none;
            color: #ffffff;
            font-size: 15px;
            transition: color 0.3s;
        }

        .navbar ul li a:hover {
            color: #f4d03f;
        }

        /* HERO SECTION */
        .hero {
            height: calc(100vh - 70px);
            background: url("/media/everest.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Strange Land Tour and Travel</div>

    <ul>
        <li><a href="#">Destination</a></li>
        <li><a href="#">Luxury Trips</a></li>
        <li><a href="#">Trekking</a></li>
        <li><a href="#">Heli Tour</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="{% url 'logout' %}">Logout</a></li>
    </ul>
</div>

<!-- HERO SECTION -->
<div class="hero">
    <div class="hero-content">
        <h1>Strange Land Tours and Travels</h1>
        <p>Where We Welcome Strangers In Our Beautiful Land</p>
    </div>
</div>

</body>
</html>
